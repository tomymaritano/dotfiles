# ~/.config/starship.toml
# Prompt with the Catppuccin Mocha palette (matches Ghostty + nvim)

# Use the palette defined below
palette = "kanagawa"

# --- Prompt format ---
format = """
[](surface0)\
$os\
$username\
[](bg:surface1 fg:surface0)\
$directory\
[](fg:surface1 bg:surface2)\
$git_branch\
$git_status\
[](fg:surface2 bg:overlay0)\
$nodejs\
$python\
$rust\
$golang\
[](fg:overlay0 bg:none)\
$fill\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

[fill]
symbol = " "

# --- Directory ---
[directory]
style = "fg:text bg:surface1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# --- Git ---
[git_branch]
symbol = ""
style = "fg:base bg:surface2"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "fg:base bg:surface2"
format = "[$all_status$ahead_behind ]($style)"

# --- Languages ---
[nodejs]
symbol = ""
style = "fg:base bg:overlay0"
format = "[ $symbol ($version) ]($style)"

[python]
symbol = ""
style = "fg:base bg:overlay0"
format = "[ $symbol ($version) ]($style)"

[rust]
symbol = ""
style = "fg:base bg:overlay0"
format = "[ $symbol ($version) ]($style)"

[golang]
symbol = ""
style = "fg:base bg:overlay0"
format = "[ $symbol ($version) ]($style)"

# --- OS / user ---
[os]
disabled = true

[username]
show_always = false
style_user = "fg:text bg:surface0"
style_root = "fg:red bg:surface0"
format = "[ $user ]($style)"

# --- Duration of long-running commands ---
[cmd_duration]
min_time = 2000
style = "fg:peach"
format = "[  $duration ]($style)"

# --- Clock on the right ---
[time]
disabled = false
time_format = "%R"
style = "fg:overlay1"
format = "[ $time ]($style)"

# --- Prompt character ---
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

