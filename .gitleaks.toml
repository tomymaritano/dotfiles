# gitleaks config — extends the built-in rules, plus allowlists for this repo's
# documentation placeholders (not real credentials).
[extend]
useDefault = true

[[allowlists]]
description = "Docs placeholders (SonarQube example commands, not real creds)"
regexes = [
  '''admin:ADMIN_PASSWORD''',
  '''-u ["']?admin:admin''',
]

[[allowlists]]
description = "1Password references and public keys are not secrets"
regexes = [
  '''op://[A-Za-z0-9/_-]+''',
  '''ssh-ed25519 AAAA[0-9A-Za-z+/=]+''',
]
